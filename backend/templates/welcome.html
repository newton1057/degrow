<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome to {{app_name}}</title>
    <style>
      body { margin: 0; background: #f3f4f8; color: #111315; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .wrap { max-width: 560px; margin: 0 auto; padding: 56px 24px; }
      .card { background: #fff; border-radius: 30px; padding: 34px; border: 1px solid rgba(17,19,21,.08); }
      h1 { margin: 0 0 12px; font-size: 34px; letter-spacing: -.8px; }
      p { color: rgba(17,19,21,.66); line-height: 1.65; }
      .button { display: inline-block; margin-top: 18px; padding: 16px 22px; border-radius: 16px; background: #111315; color: #fff; text-decoration: none; font-weight: 800; }
      .steps { margin: 24px 0 0; padding: 0; list-style: none; }
      .steps li { padding: 12px 0; border-top: 1px solid rgba(17,19,21,.08); font-weight: 700; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="card">
        <h1>Welcome to {{app_name}}</h1>
        <p>Hi {{user_name}}, your account is ready. Start with one habit, set a reminder, and use focus sessions to track the work as it happens.</p>
        <ul class="steps">
          <li>1. Create your first habit</li>
          <li>2. Choose the days you want to practice</li>
          <li>3. Start a timer when you begin</li>
        </ul>
        <a class="button" href="{{cta_url}}">Open {{app_name}}</a>
      </section>
    </div>
  </body>
</html>
