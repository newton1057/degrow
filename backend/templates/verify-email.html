<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verify your email</title>
    <style>
      body { margin: 0; background: #f3f4f8; color: #111315; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .wrap { max-width: 520px; margin: 0 auto; padding: 56px 24px; }
      .card { background: #fff; border-radius: 28px; padding: 32px; border: 1px solid rgba(17,19,21,.08); }
      h1 { margin: 0 0 12px; font-size: 30px; }
      p { color: rgba(17,19,21,.66); line-height: 1.6; }
      .button { display: inline-block; margin-top: 18px; padding: 16px 22px; border-radius: 16px; background: #111315; color: #fff; text-decoration: none; font-weight: 800; }
      .meta { margin-top: 28px; font-size: 12px; color: rgba(17,19,21,.48); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="card">
        <h1>Verify your email</h1>
        <p>Hi {{user_name}}, confirm this email address to secure your {{app_name}} account and keep your habit data ready for sync.</p>
        <a class="button" href="{{verification_url}}">Verify Email</a>
        <p class="meta">If you did not create an account, you can ignore this message.</p>
      </section>
    </div>
  </body>
</html>
