<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your weekly {{app_name}} review</title>
    <style>
      body { margin: 0; background: #f3f4f8; color: #111315; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .wrap { max-width: 600px; margin: 0 auto; padding: 56px 24px; }
      .card { background: #fff; border-radius: 30px; padding: 34px; border: 1px solid rgba(17,19,21,.08); }
      h1 { margin: 0 0 12px; font-size: 34px; letter-spacing: -.8px; }
      p { color: rgba(17,19,21,.66); line-height: 1.65; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 24px 0; }
      .metric { padding: 18px; border-radius: 20px; background: #f6f7fb; }
      .value { font-size: 28px; font-weight: 900; }
      .label { color: rgba(17,19,21,.56); font-size: 12px; font-weight: 700; }
      .button { display: inline-block; padding: 16px 22px; border-radius: 16px; background: #111315; color: #fff; text-decoration: none; font-weight: 800; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="card">
        <h1>Your weekly review</h1>
        <p>Here is how your habits performed this week, {{user_name}}.</p>
        <div class="grid">
          <div class="metric"><div class="value">{{completed_count}}</div><div class="label">Completed</div></div>
          <div class="metric"><div class="value">{{best_streak}}</div><div class="label">Best Streak</div></div>
          <div class="metric"><div class="value">{{active_habits}}</div><div class="label">Active Habits</div></div>
        </div>
        <a class="button" href="{{cta_url}}">Open Weekly Review</a>
      </section>
    </div>
  </body>
</html>
