<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your habit reminder</title>
    <style>
      body { margin: 0; background: #f3f4f8; color: #111315; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .wrap { max-width: 520px; margin: 0 auto; padding: 56px 24px; }
      .card { background: #fff; border-radius: 28px; padding: 32px; border: 1px solid rgba(17,19,21,.08); }
      h1 { margin: 0 0 12px; font-size: 30px; }
      p { color: rgba(17,19,21,.66); line-height: 1.6; }
      .habit { margin: 22px 0; padding: 18px; border-radius: 20px; background: #f6f7fb; font-weight: 800; }
      .button { display: inline-block; padding: 16px 22px; border-radius: 16px; background: #111315; color: #fff; text-decoration: none; font-weight: 800; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="card">
        <h1>Time for your habit</h1>
        <p>Hi {{user_name}}, this is your scheduled reminder for today.</p>
        <div class="habit">{{habit_name}} at {{reminder_time}}</div>
        <a class="button" href="{{cta_url}}">Start Focus Session</a>
      </section>
    </div>
  </body>
</html>
