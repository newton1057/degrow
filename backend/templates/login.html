<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log in to {{app_name}}</title>
    <style>
      body { margin: 0; background: #f3f4f8; color: #111315; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { max-width: 420px; margin: 0 auto; padding: 56px 24px; }
      .card { background: #fff; border: 1px solid rgba(17,19,21,.08); border-radius: 28px; padding: 32px; box-shadow: 0 24px 80px rgba(17,19,21,.08); }
      h1 { margin: 0 0 10px; font-size: 32px; letter-spacing: -.8px; }
      p { margin: 0 0 24px; color: rgba(17,19,21,.66); line-height: 1.55; }
      label { display: block; margin: 18px 0 8px; font-weight: 700; font-size: 14px; }
      input { box-sizing: border-box; width: 100%; height: 52px; border-radius: 16px; border: 1px solid rgba(17,19,21,.12); padding: 0 16px; font-size: 16px; }
      button { width: 100%; height: 54px; margin-top: 24px; border: 0; border-radius: 18px; background: #111315; color: #fff; font-size: 16px; font-weight: 800; cursor: pointer; }
      .footer { margin-top: 18px; text-align: center; font-size: 14px; }
      a { color: #111315; font-weight: 800; }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Welcome back</h1>
        <p>Log in to continue tracking your habits, reminders, and weekly progress.</p>
        <form method="post" action="{{login_action_url}}">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
          <button type="submit">Log In</button>
        </form>
        <p class="footer"><a href="{{forgot_password_url}}">Forgot password?</a></p>
      </section>
    </main>
  </body>
</html>
